<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IMMERSION - SECTEUR_SECURISE - DRASHAMY</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="system-bridge.js"></script>

    <style>
        :root { --bordeaux: #660011; --rouge-vif: #ff0033; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
        
        /* --- VISUALISEUR --- */
        model-viewer { width: 100%; height: 100%; background-color: #000; display: none; } /* Caché par défaut pour la sécurité */

        /* --- INTERFACE OSD --- */
        .hud-overlay { position: fixed; inset: 0; pointer-events: none; border: 1px solid rgba(255, 0, 51, 0.2); z-index: 10; display: none; }
        .status-bar { position: absolute; top: 20px; left: 20px; color: var(--rouge-vif); font-size: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-left: 3px solid var(--rouge-vif); }

        /* --- LOADING SCREEN --- */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: var(--rouge-vif); }
        .progress-bar { width: 200px; height: 2px; background: #200; margin-top: 20px; }
        .update-fill { height: 100%; width: 0%; background: var(--rouge-vif); box-shadow: 0 0 15px var(--rouge-vif); transition: 0.3s; }

        /* --- ACCÈS REFUSÉ --- */
        #access-denied { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: var(--rouge-vif); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="access-denied">
        <h1 style="font-size: 20px;">[ ACCÈS REFUSÉ ]</h1>
        <p style="font-size: 12px; max-width: 80%;">SIGNAL CRYPTÉ. SCANNEZ UNE CARTE D'ACCÈS VALIDE.</p>
    </div>

    <div id="loader">
        <div style="letter-spacing: 5px; font-size: 12px;">VÉRIFICATION_CRÉDENTIELS...</div>
        <div class="progress-bar"><div id="fill" class="update-fill"></div></div>
        <div id="percent" style="font-size: 10px; margin-top: 10px;">0%</div>
    </div>

    <div class="hud-overlay" id="hud">
        <div class="status-bar">
            UNIT: OMNI_IMMERSION_R2<br>
            STATUS: <span id="load-status">STABLE</span><br>
            USER: <span id="user-type">GUEST</span>
        </div>
    </div>

    <model-viewer id="maquette"
        src="images/maquette_r2.glb" 
        camera-controls
        touch-action="none"
        shadow-intensity="2"
        exposure="1"
        loading="eager"
        ar-modes="webxr scene-viewer">
        
        <button class="Hotspot" slot="hotspot-1" data-position="0m 1m 0m" data-normal="0m 1m 0m" onclick="interagir('INFO: Secteur R2 opérationnel')">
            <div style="background:var(--rouge-vif); width:12px; height:12px; border-radius:50%; box-shadow: 0 0 10px var(--rouge-vif);"></div>
        </button>
    </model-viewer>

    <script>
        const viewer = document.querySelector('#maquette');
        const fill = document.querySelector('#fill');
        const percent = document.querySelector('#percent');

        // --- 🔐 PROTOCOLE DE SÉCURITÉ ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const access = urlParams.get('access');

            // Vérifie si Master (via bridge) ou Invité (via URL)
            const isAuthorized = (typeof STATE !== 'undefined' && STATE.isMaster) || access === 'GUEST_IMMERSION';

            if (!isAuthorized) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('access-denied').style.display = 'flex';
                return;
            }

            // Si autorisé, on lance
            document.getElementById('user-type').innerText = STATE.isMaster ? "MASTER_HINARU" : "AUTHORIZED_GUEST";
            bootImmersion();
        };

        function bootImmersion() {
            viewer.style.display = 'block';
            document.getElementById('hud').style.display = 'block';

            viewer.addEventListener('progress', (ev) => {
                const p = Math.floor(ev.detail.totalProgress * 100);
                fill.style.width = p + "%";
                percent.innerText = p + "%";
                if (p === 100) {
                    setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
                }
            });
        }

        // --- 🎮 NAVIGATION ZQSD (PC) ---
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('loader').style.display === 'none') {
                const orbit = viewer.getCameraOrbit();
                switch(e.key.toLowerCase()) {
                    case 'z': viewer.cameraTarget = `auto auto ${parseFloat(viewer.cameraTarget.split(' ')[2]) - 0.5}m`; break;
                    case 's': viewer.cameraTarget = `auto auto ${parseFloat(viewer.cameraTarget.split(' ')[2]) + 0.5}m`; break;
                    case 'q': viewer.cameraOrbit = `${orbit.theta - 0.1}rad ${orbit.phi}rad ${orbit.radius}m`; break;
                    case 'd': viewer.cameraOrbit = `${orbit.theta + 0.1}rad ${orbit.phi}rad ${orbit.radius}m`; break;
                }
            }
        });

        function interagir(message) { alert("[OMNI_SIGNAL]: " + message); }

    </script>
</body>
</html>
