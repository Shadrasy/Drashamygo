<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IMMERSION - SECTEUR_SECURISE - DRASHAMY</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<script src="system-bridge.js"></script>
<style>
:root { 
    --bordeaux: #660011; 
    --rouge-vif: #ff0033; 
    --cyan-system: #00e5ff; /* Ajout de votre couleur cyan pour le scan */
}
body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }

/* --- VOTRE BLOC : CADRE CYBORG ET LIGNE DE SCAN --- */
.cyborg-full-frame { 
    width: 100%; 
    height: 100%; 
    position: absolute; 
    inset: 0;
    display: none; /* Caché par défaut pour l'écran de chargement */
}
.scan-line { 
    position: absolute; 
    width: 100%; 
    height: 2px; 
    background: var(--cyan-system); 
    box-shadow: 0 0 15px var(--cyan-system); 
    animation: scanBody 3s infinite linear; 
    z-index: 10; 
    pointer-events: none; 
}
@keyframes scanBody { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

/* --- INTERFACE OSD --- */
.hud-overlay { position: fixed; inset: 0; pointer-events: none; border: 1px solid rgba(255, 0, 51, 0.2); z-index: 20; display: none; }
.status-bar { position: absolute; top: 20px; left: 20px; color: var(--rouge-vif); font-size: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-left: 3px solid var(--rouge-vif); }

/* --- LOADING SCREEN --- */
#loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: var(--rouge-vif); }
.progress-bar { width: 200px; height: 2px; background: #200; margin-top: 20px; }
.update-fill { height: 100%; width: 0%; background: var(--rouge-vif); box-shadow: 0 0 15px var(--rouge-vif); transition: 0.3s; }

/* --- ACCÈS REFUSÉ --- */
#access-denied { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: var(--rouge-vif); letter-spacing: 2px; }
</style>
</head>
<body>

<div id="access-denied">
    <h1 style="font-size: 20px;">[ ACCÈS REFUSÉ ]</h1>
    <p style="font-size: 12px; max-width: 80%;">SIGNAL CRYPTÉ. SCANNEZ UNE CARTE D'ACCÈS VALIDE.</p>
</div>

<div id="loader">
    <div style="letter-spacing: 5px; font-size: 12px;">VÉRIFICATION_CRÉDENTIELS...</div>
    <div class="progress-bar"><div id="fill" class="update-fill"></div></div>
    <div id="percent" style="font-size: 10px; margin-top: 10px;">0%</div>
</div>

<div class="hud-overlay" id="hud">
    <div class="status-bar">
        UNIT: DRAGONNET_CYBORG_HYBRIDE<br>
        STATUS: <span id="load-status">STABLE</span><br>
        USER: <span id="user-type">GUEST</span>
    </div>
</div>

<!-- VOTRE BLOC INTÉGRÉ ICI -->
<div class="cyborg-full-frame" id="frame-container">
    <div class="scan-line"></div>
    
    <model-viewer id="dragonnier-view" 
        src="images/humain_base.glb" 
        camera-controls 
        auto-rotate
        shadow-intensity="1"
        exposure="1.5"
        environment-image="neutral"
        style="width: 100%; height: 100%;">
        
        <!-- Petit bouton d'interaction holographique conservé -->
        <button class="Hotspot" slot="hotspot-1" data-position="0m 1m 0m" data-normal="0m 1m 0m" onclick="interagir('INFO: ADN personnalisé chargé avec succès')">
            <div style="background:var(--rouge-vif); width:12px; height:12px; border-radius:50%; box-shadow: 0 0 10px var(--rouge-vif);"></div>
        </button>
    </model-viewer>
</div>

<script>
// Le code cible désormais votre ID #dragonnier-view
const viewer = document.querySelector('#dragonnier-view');
const frameContainer = document.querySelector('#frame-container');
const fill = document.querySelector('#fill');
const percent = document.querySelector('#percent');

// ========================================================
// 🧬 LA PASSERELLE : LECTURE DE L'ADN SAUVEGARDÉ
// ========================================================
viewer.addEventListener('load', () => {
    // 1. Récupération des données depuis le noyau mémoire (localStorage)
    const skinVal = localStorage.getItem('OMNI_ADN_SKIN') || 0;
    const scaleVal = localStorage.getItem('OMNI_ADN_SCALE') || 10;
    const metalVal = localStorage.getItem('OMNI_ADN_METAL') || 20;

    if (!viewer.model) return;
    
    // 2. On cible la texture de base du modèle 3D
    const material = viewer.model.materials;

    // 3. Application des mutations génétiques
    if (material && material.pbrMetallicRoughness) {
        const r = 1 - (skinVal / 200);
        const g = 0.8 - (skinVal / 200);
        const b = 0.6 - (skinVal / 200);
        
        material.pbrMetallicRoughness.setBaseColorFactor([r, g, b, 1]);
        material.pbrMetallicRoughness.setMetallicFactor(metalVal / 100);
        material.pbrMetallicRoughness.setRoughnessFactor(1 - (scaleVal / 100));
        
        console.log("[SYSTEM] : ADN personnalisé injecté avec succès dans l'Immersion 3D.");
    }
});
// ========================================================

// --- 🔐 PROTOCOLE DE SÉCURITÉ ---
window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const access = urlParams.get('access');
    
    // Vérifie si Master (via bridge) ou Invité (via URL)
    const isAuthorized = (typeof STATE !== 'undefined' && STATE.isMaster) || access === 'SECRET_CHANNEL' || access === 'GUEST_IMMERSION';
    
    if (!isAuthorized) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('access-denied').style.display = 'flex';
        return;
    }
    
    // Si autorisé, on lance
    document.getElementById('user-type').innerText = (typeof STATE !== 'undefined' && STATE.isMaster) ? "MASTER_HINARU" : "AUTHORIZED_GUEST";
    bootImmersion();
};

function bootImmersion() {
    frameContainer.style.display = 'block'; // Affiche le cadre contenant le scan et le modèle
    document.getElementById('hud').style.display = 'block';
    
    viewer.addEventListener('progress', (ev) => {
        const p = Math.floor(ev.detail.totalProgress * 100);
        fill.style.width = p + "%";
        percent.innerText = p + "%";
        if (p === 100) {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
        }
    });
}

// --- 🎮 NAVIGATION ZQSD (PC) ---
window.addEventListener('keydown', (e) => {
    if (document.getElementById('loader').style.display === 'none') {
        const orbit = viewer.getCameraOrbit();
        // Optionnel : sécurise la récupération de la target de la caméra
        const targetParts = viewer.cameraTarget.split(' ');
        const zPos = targetParts.length > 2 ? parseFloat(targetParts[1]) : 0;

        switch(e.key.toLowerCase()) {
            case 'z': viewer.cameraTarget = `auto auto ${zPos - 0.5}m`; break;
            case 's': viewer.cameraTarget = `auto auto ${zPos + 0.5}m`; break;
            case 'q': viewer.cameraOrbit = `${orbit.theta - 0.1}rad ${orbit.phi}rad ${orbit.radius}m`; break;
            case 'd': viewer.cameraOrbit = `${orbit.theta + 0.1}rad ${orbit.phi}rad ${orbit.radius}m`; break;
        }
    }
});

function interagir(message) { alert("[OMNI_SIGNAL]: " + message); }
</script>
</body>
</html>
